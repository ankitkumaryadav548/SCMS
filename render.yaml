services:
  - type: web
    name: smart-city-backend
    env: node
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JAVA_ENGINE_URL
        sync: false
